<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>병 · 캔 사물 구분</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #1a1a2e;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      padding: 36px 32px;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .header p { color: #666; font-size: 14px; line-height: 1.5; }
    .drop {
      display: block; width: 100%; border: 2px dashed #c3c3d6; border-radius: 12px;
      padding: 40px 20px; text-align: center; color: #888; font-size: 14px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .drop:hover { border-color: #667eea; background: #f7f7fb; }
    .drop .icon { font-size: 40px; display: block; margin-bottom: 10px; }
    .drop strong { color: #667eea; }
    .stage { margin-top: 20px; display: flex; flex-direction: column; align-items: center; }
    #preview {
      display: none; max-width: 100%; max-height: 300px;
      border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .labels { width: 100%; margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
    .row .top { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .row .pct { color: #667eea; }
    .bar { height: 14px; background: #eee; border-radius: 7px; overflow: hidden; }
    .bar > span {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.25s ease;
    }
    .row.winner .top { color: #764ba2; }
    .row.winner .name::before { content: "🏆 "; }
    .again {
      display: none; width: 100%; margin-top: 20px; padding: 12px;
      background: #f0f0f7; color: #555; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .again:hover { background: #e6e6f2; }
    .status { text-align: center; font-size: 13px; color: #999; margin-top: 16px; min-height: 18px; }
    .status.err { color: #e74c3c; }
    .back { margin-top: 22px; text-align: center; }
    .back a { color: #fff; font-size: 13px; opacity: 0.85; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>사물 구분 · 병 vs 캔</h1>
      <p>사진을 올리면 물체를 인식합니다.<br>Teachable Machine 이미지 모델 기반.</p>
    </div>

    <label class="drop" for="file-input" id="drop-zone">
      <span class="icon">📷</span>
      <span id="drop-text"><strong>클릭해서 사진 선택</strong><br>또는 이미지를 여기로 끌어다 놓으세요</span>
    </label>
    <input type="file" id="file-input" accept="image/*" style="display:none;">

    <div class="stage">
      <img id="preview" alt="업로드 미리보기">
    </div>

    <div class="labels" id="label-container"></div>

    <button class="again" id="again-btn" onclick="resetPicker()">다른 사진 올리기</button>
    <div class="status" id="status">모델 로딩 대기 중...</div>
  </div>

  <div class="back"><a href="index.html">← 제휴 문의 페이지로</a></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL_BASE = "https://teachablemachine.withgoogle.com/models/SDclz0jlZ/";

    // ▼▼▼ 라벨 이름 바꾸려면 여기만 수정하세요 (Teachable Machine 기본 라벨 → 표시 이름) ▼▼▼
    const LABEL_MAP = {
      "Class 1": "Class 1",
      "Class 2": "Class 2"
    };
    // 예: { "Class 1": "병", "Class 2": "캔" }
    // ▲▲▲ 어느 클래스가 병/캔인지 확인 후 위 값을 바꾸면 화면에 한글로 표시됩니다 ▲▲▲

    let model, maxPredictions, modelReady = false;
    const statusEl = document.getElementById('status');
    const labelContainer = document.getElementById('label-container');
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const dropZone = document.getElementById('drop-zone');
    const dropText = document.getElementById('drop-text');
    const againBtn = document.getElementById('again-btn');

    function setStatus(msg, isErr) {
      statusEl.textContent = msg;
      statusEl.className = isErr ? 'status err' : 'status';
    }
    function displayName(raw) { return LABEL_MAP[raw] || raw; }

    async function loadModel() {
      if (modelReady) return;
      setStatus('모델 로딩 중...');
      try {
        model = await tmImage.load(URL_BASE + "model.json", URL_BASE + "metadata.json");
        maxPredictions = model.getTotalClasses();
        buildLabelRows();
        modelReady = true;
        setStatus('사진을 올려주세요');
      } catch (e) {
        setStatus('모델 로딩 실패: ' + e.message, true);
        throw e;
      }
    }

    function buildLabelRows() {
      labelContainer.innerHTML = '';
      model.getClassLabels().forEach(raw => {
        const row = document.createElement('div');
        row.className = 'row';
        row.dataset.raw = raw;
        row.innerHTML =
          '<div class="top"><span class="name">' + displayName(raw) +
          '</span><span class="pct">0%</span></div>' +
          '<div class="bar"><span></span></div>';
        labelContainer.appendChild(row);
      });
    }

    function renderPredictions(preds) {
      let best = -1, bestIdx = 0;
      preds.forEach((p, i) => { if (p.probability > best) { best = p.probability; bestIdx = i; } });
      const rows = labelContainer.querySelectorAll('.row');
      preds.forEach((p, i) => {
        const row = rows[i];
        if (!row) return;
        const pct = Math.round(p.probability * 100);
        row.querySelector('.pct').textContent = pct + '%';
        row.querySelector('.bar > span').style.width = pct + '%';
        row.classList.toggle('winner', i === bestIdx && best > 0.5);
      });
    }

    // ===== 이미지 업로드 =====
    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    ['dragover','dragenter'].forEach(ev => dropZone.addEventListener(ev, e => {
      e.preventDefault(); dropZone.style.borderColor = '#667eea'; dropZone.style.background = '#f7f7fb';
    }));
    ['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => {
      e.preventDefault(); dropZone.style.borderColor = ''; dropZone.style.background = '';
    }));
    dropZone.addEventListener('drop', e => {
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) { setStatus('이미지 파일만 가능합니다.', true); return; }
      try { await loadModel(); } catch (e) { return; }
      const url = URL.createObjectURL(file);
      preview.onload = async () => {
        preview.style.display = 'block';
        dropZone.style.display = 'none';
        setStatus('분석 중...');
        const preds = await model.predict(preview);
        renderPredictions(preds);
        const best = preds.reduce((a, b) => a.probability > b.probability ? a : b);
        setStatus('결과: ' + displayName(best.className) + ' (' + Math.round(best.probability*100) + '%)');
        againBtn.style.display = 'block';
        URL.revokeObjectURL(url);
      };
      preview.src = url;
    }

    function resetPicker() {
      preview.style.display = 'none';
      preview.src = '';
      dropZone.style.display = 'block';
      againBtn.style.display = 'none';
      fileInput.value = '';
      renderPredictions(model.getClassLabels().map(c => ({ className: c, probability: 0 })));
      setStatus('사진을 올려주세요');
    }

    // 페이지 로드 시 모델 미리 로딩
    window.addEventListener('load', () => { loadModel().catch(() => {}); });
  </script>
</body>
</html>

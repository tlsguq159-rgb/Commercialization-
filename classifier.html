<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>병 · 캔 사물 구분</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #1a1a2e;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      padding: 36px 32px;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .header p { color: #666; font-size: 14px; line-height: 1.5; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1; padding: 10px; border: 1.5px solid #e0e0e6; background: #f7f7fb;
      border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
      color: #666; transition: all 0.2s;
    }
    .tab.active { background: #667eea; color: #fff; border-color: #667eea; }
    button.action {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; border: none; border-radius: 8px;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    button.action:hover { opacity: 0.92; }
    button.action:disabled { opacity: 0.6; cursor: not-allowed; }
    .stage {
      margin-top: 20px; min-height: 60px; display: flex;
      flex-direction: column; align-items: center; gap: 16px;
    }
    #webcam-container canvas, #preview {
      border-radius: 12px; max-width: 100%; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    #preview { display: none; max-height: 260px; }
    .drop {
      width: 100%; border: 2px dashed #c3c3d6; border-radius: 12px;
      padding: 28px; text-align: center; color: #888; font-size: 14px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
    }
    .drop:hover { border-color: #667eea; background: #f7f7fb; }
    .labels { width: 100%; margin-top: 8px; display: flex; flex-direction: column; gap: 10px; }
    .row { }
    .row .top { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .row .pct { color: #667eea; }
    .bar { height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
    .bar > span {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.25s ease;
    }
    .row.winner .top { color: #764ba2; }
    .row.winner .name::before { content: "🏆 "; }
    .status { text-align: center; font-size: 13px; color: #999; margin-top: 12px; min-height: 18px; }
    .status.err { color: #e74c3c; }
    .back { margin-top: 22px; text-align: center; }
    .back a { color: #fff; font-size: 13px; opacity: 0.85; text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>사물 구분 · 병 vs 캔</h1>
      <p>웹캠 또는 이미지로 물체를 인식합니다.<br>Teachable Machine 이미지 모델 기반.</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-webcam" onclick="switchMode('webcam')">📷 웹캠</button>
      <button class="tab" id="tab-image" onclick="switchMode('image')">🖼️ 이미지 업로드</button>
    </div>

    <!-- 웹캠 모드 -->
    <div id="mode-webcam">
      <button class="action" id="start-btn" onclick="initWebcam()">웹캠 시작</button>
      <div class="stage">
        <div id="webcam-container"></div>
      </div>
    </div>

    <!-- 이미지 모드 -->
    <div id="mode-image" style="display:none;">
      <label class="drop" for="file-input" id="drop-zone">
        여기를 클릭하거나 이미지를 끌어다 놓으세요
      </label>
      <input type="file" id="file-input" accept="image/*" style="display:none;">
      <div class="stage">
        <img id="preview" alt="업로드 미리보기">
      </div>
    </div>

    <div class="labels" id="label-container"></div>
    <div class="status" id="status">모델 로딩 대기 중...</div>
  </div>

  <div class="back"><a href="index.html">← 제휴 문의 페이지로</a></div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL_BASE = "https://teachablemachine.withgoogle.com/models/SDclz0jlZ/";

    // ▼▼▼ 라벨 이름 바꾸려면 여기만 수정하세요 (Teachable Machine 기본 라벨 → 표시 이름) ▼▼▼
    const LABEL_MAP = {
      "Class 1": "Class 1",
      "Class 2": "Class 2"
    };
    // 예: { "Class 1": "병", "Class 2": "캔" }
    // ▲▲▲ 어느 클래스가 병/캔인지 확인 후 위 값을 바꾸면 화면에 한글로 표시됩니다 ▲▲▲

    let model, webcam, maxPredictions, rafId;
    let modelReady = false;
    const statusEl = document.getElementById('status');
    const labelContainer = document.getElementById('label-container');

    function setStatus(msg, isErr) {
      statusEl.textContent = msg;
      statusEl.className = isErr ? 'status err' : 'status';
    }
    function displayName(raw) { return LABEL_MAP[raw] || raw; }

    async function loadModel() {
      if (modelReady) return;
      setStatus('모델 로딩 중...');
      try {
        model = await tmImage.load(URL_BASE + "model.json", URL_BASE + "metadata.json");
        maxPredictions = model.getTotalClasses();
        buildLabelRows();
        modelReady = true;
        setStatus('모델 준비 완료 ✅');
      } catch (e) {
        setStatus('모델 로딩 실패: ' + e.message, true);
        throw e;
      }
    }

    function buildLabelRows() {
      labelContainer.innerHTML = '';
      const classes = model.getClassLabels();
      classes.forEach(raw => {
        const row = document.createElement('div');
        row.className = 'row';
        row.dataset.raw = raw;
        row.innerHTML =
          '<div class="top"><span class="name">' + displayName(raw) +
          '</span><span class="pct">0%</span></div>' +
          '<div class="bar"><span></span></div>';
        labelContainer.appendChild(row);
      });
    }

    function renderPredictions(preds) {
      let best = -1, bestIdx = 0;
      preds.forEach((p, i) => { if (p.probability > best) { best = p.probability; bestIdx = i; } });
      const rows = labelContainer.querySelectorAll('.row');
      preds.forEach((p, i) => {
        const row = rows[i];
        if (!row) return;
        const pct = Math.round(p.probability * 100);
        row.querySelector('.pct').textContent = pct + '%';
        row.querySelector('.bar > span').style.width = pct + '%';
        row.classList.toggle('winner', i === bestIdx && best > 0.5);
      });
    }

    // ===== 웹캠 모드 =====
    async function initWebcam() {
      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      try {
        await loadModel();
        const flip = true;
        webcam = new tmImage.Webcam(240, 240, flip);
        await webcam.setup();
        await webcam.play();
        document.getElementById('webcam-container').innerHTML = '';
        document.getElementById('webcam-container').appendChild(webcam.canvas);
        btn.style.display = 'none';
        setStatus('실시간 인식 중...');
        loop();
      } catch (e) {
        btn.disabled = false;
        setStatus('웹캠을 시작할 수 없습니다: ' + e.message, true);
      }
    }
    async function loop() {
      webcam.update();
      const preds = await model.predict(webcam.canvas);
      renderPredictions(preds);
      rafId = window.requestAnimationFrame(loop);
    }
    function stopWebcam() {
      if (rafId) cancelAnimationFrame(rafId);
      if (webcam) { try { webcam.stop(); } catch (e) {} webcam = null; }
      const c = document.getElementById('webcam-container');
      if (c) c.innerHTML = '';
      const btn = document.getElementById('start-btn');
      btn.style.display = ''; btn.disabled = false;
    }

    // ===== 이미지 업로드 모드 =====
    const fileInput = document.getElementById('file-input');
    const preview = document.getElementById('preview');
    const dropZone = document.getElementById('drop-zone');

    fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
    ['dragover','dragenter'].forEach(ev => dropZone.addEventListener(ev, e => {
      e.preventDefault(); dropZone.style.borderColor = '#667eea';
    }));
    ['dragleave','drop'].forEach(ev => dropZone.addEventListener(ev, e => {
      e.preventDefault(); dropZone.style.borderColor = '';
    }));
    dropZone.addEventListener('drop', e => {
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) { setStatus('이미지 파일만 가능합니다.', true); return; }
      try {
        await loadModel();
      } catch (e) { return; }
      const url = URL.createObjectURL(file);
      preview.onload = async () => {
        preview.style.display = 'block';
        setStatus('분석 중...');
        const preds = await model.predict(preview);
        renderPredictions(preds);
        const best = preds.reduce((a, b) => a.probability > b.probability ? a : b);
        setStatus('결과: ' + displayName(best.className) + ' (' + Math.round(best.probability*100) + '%)');
        URL.revokeObjectURL(url);
      };
      preview.src = url;
    }

    // ===== 모드 전환 =====
    function switchMode(mode) {
      const isCam = mode === 'webcam';
      document.getElementById('tab-webcam').classList.toggle('active', isCam);
      document.getElementById('tab-image').classList.toggle('active', !isCam);
      document.getElementById('mode-webcam').style.display = isCam ? '' : 'none';
      document.getElementById('mode-image').style.display = isCam ? 'none' : '';
      if (isCam) { preview.style.display = 'none'; }
      else { stopWebcam(); }
      if (modelReady) setStatus(isCam ? '웹캠 시작을 눌러주세요' : '이미지를 올려주세요');
    }

    // 페이지 로드 시 모델 미리 로딩
    window.addEventListener('load', () => { loadModel().catch(() => {}); });
  </script>
</body>
</html>
